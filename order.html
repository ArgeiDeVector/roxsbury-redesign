<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roxsbury Deli &amp; Grill — Order Online</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
  :root{--order-crop:356px;--order-crop-m:420px;}
  /* ORDER PAGE — matches site layout: nav fixed on top, iframe flows UNDER the
     nav with the SAME var(--nav-h) offset, page does NOT lock. Tatinc's own
     header + brand/contact block is cropped behind our nav via --order-crop
     (measured: tatinc category buttons start ~356px down desktop, ~420px mobile).
     Cross-origin, so we can only shift the whole iframe — if tatinc reskins its
     header, just bump --order-crop. */
  .nav{background:#0e0e0e;}
  .order-frame{position:relative;margin-top:var(--nav-h);
    height:calc(100vh - var(--nav-h));background:#fff;overflow:hidden;}
  .order-frame iframe{position:absolute;top:calc(-1 * var(--order-crop));left:0;
    width:100%;height:calc(100% + var(--order-crop));border:0;display:block;}
  @media(max-width:880px){
    .order-frame iframe{top:calc(-1 * var(--order-crop-m));height:calc(100% + var(--order-crop-m));}
  }
</style>
</head>
<body>

<nav class="nav">
  <a class="brand" href="index.html">
    <img src="assets/logo.png" alt="Roxsbury logo">
    <span><b>Roxsbury</b><span>Deli &amp; Grill</span></span>
  </a>
  <button class="nav-toggle" aria-label="Menu" aria-expanded="false">☰</button>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="menu.html">Menu</a>
    <a href="order.html" class="active">Order</a>
    <a href="index.html#location">Location</a>
    <a href="index.html#reviews">Reviews</a>
  </div>
</nav>

<div class="order-frame">
  <iframe src="https://roxsbury.tatinc.us" title="Roxsbury online ordering" loading="lazy"></iframe>
</div>

<script>
  // Mobile hamburger (same pattern as other pages)
  const navToggle = document.querySelector('.nav-toggle');
  const navMenu = document.querySelector('.nav .links');
  if (navToggle && navMenu){
    navToggle.addEventListener('click', () => {
      const open = navMenu.classList.toggle('open');
      navToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
    navMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      navMenu.classList.remove('open');
      navToggle.setAttribute('aria-expanded', 'false');
    }));
  }
</script>
</body>
</html>
