<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roxsbury Deli &amp; Grill — Order Online</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
  /* ORDER PAGE — embed (B2-derived, modal-safe).
     Nav stays position:fixed (same as every other page). The iframe below uses
     VIEWPORT height (100vh - var(--nav-h)) — NOT a tall fixed height.
     WHY NOT TALL: tatinc opens item-option popups with position:fixed, which
     anchors to the IFRAME's viewport. A 11000px-tall frame made those modals
     drop to the bottom of that giant box (off-screen where you're looking).
     Viewport-height frame => fixed modals anchor to what you see => open in-view.
     The ONLY offset is nav height (var(--nav-h)); nothing tied to tatinc's
     layout, so swapping providers (or a reskin) just works.
     No crop trick: tatinc's own header shows under our nav (brand shows twice —
     accepted, can't reach into cross-origin page). tatinc scrolls internally
     within the frame. */
  .nav{background:#0e0e0e;}
  .order-frame{position:relative;margin-top:var(--nav-h);
    height:calc(100vh - var(--nav-h));height:calc(100dvh - var(--nav-h));background:#fff;}
  .order-frame iframe{position:absolute;top:0;left:0;
    width:100%;height:100%;border:0;display:block;}
</style>
</head>
<body>

<nav class="nav">
  <a class="brand" href="index.html">
    <img src="assets/logo.png" alt="Roxsbury logo">
    <span><b>Roxsbury</b><span>Deli &amp; Grill</span></span>
  </a>
  <button class="nav-toggle" aria-label="Menu" aria-expanded="false">☰</button>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="menu.html">Menu</a>
    <a href="order.html" class="active">Order</a>
    <a href="index.html#location">Location</a>
    <a href="index.html#reviews">Reviews</a>
  </div>
</nav>

<div class="order-frame">
  <iframe src="https://roxsbury.tatinc.us" title="Roxsbury online ordering" loading="eager"></iframe>
</div>

<script>
  // Mobile hamburger (same pattern as other pages)
  const navToggle = document.querySelector('.nav-toggle');
  const navMenu = document.querySelector('.nav .links');
  if (navToggle && navMenu){
    navToggle.addEventListener('click', () => {
      const open = navMenu.classList.toggle('open');
      navToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
    navMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      navMenu.classList.remove('open');
      navToggle.setAttribute('aria-expanded', 'false');
    }));
  }
</script>
<script src="assets/protect.js"></script>
</body>
</html>
